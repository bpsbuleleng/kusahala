<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Pegawai — Koperasi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-header"></header>

  <div class="container">
    <div class="toolbar">
      <a class="btn btn-outline" href="admin-barang.html">📦 Barang</a>
      <a class="btn btn-primary" href="admin-pegawai.html">👤 Pegawai</a>
      <a class="btn btn-outline" href="admin-pesanan.html">🧾 Pesanan</a>
      <a class="btn btn-outline" href="laporan.html">📊 Laporan</a>
      <span id="admin-bar" style="margin-left:auto;display:flex;align-items:center"></span>
    </div>

    <div class="section">
      <div class="toolbar" style="margin:0 0 12px">
        <input id="f-nama" type="text" placeholder="Nama pegawai baru…" style="flex:1;min-width:160px">
        <button class="btn btn-green" id="btn-tambah">+ Tambah</button>
      </div>
      <div class="table-wrap">
        <table class="tbl" id="tabel">
          <thead><tr><th>Nama</th><th style="width:90px">Aksi</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <p class="text-muted" style="font-size:12px">💡 Klik nama untuk mengedit, lalu klik di luar untuk menyimpan.</p>
  </div>

  <nav id="app-bottomnav" class="bottomnav"></nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-pegawai.js"></script>
</body>
</html>

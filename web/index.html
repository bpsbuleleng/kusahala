<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Koperasi — Belanja</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-header"></header>

  <div class="pegawai-bar">
    <label for="pegawai">👤 Pegawai:</label>
    <select id="pegawai"><option value="">Memuat…</option></select>
  </div>

  <div class="container">
    <section class="rec-sec" id="rec-personal" hidden>
      <h2 class="rec-title">🛒 Sering Anda pesan</h2>
      <div class="rec-row" id="rec-personal-row"></div>
    </section>
    <section class="rec-sec" id="rec-bestseller" hidden>
      <h2 class="rec-title">🔥 Best Seller bulan lalu</h2>
      <div class="rec-row" id="rec-bestseller-row"></div>
    </section>

    <div id="grid" class="product-grid"></div>
    <div id="sentinel" class="scroll-sentinel"></div>
    <div id="more" class="loading-more" hidden>Memuat…</div>
    <div id="end" class="end-list" hidden>— Semua barang sudah tampil —</div>
    <div id="empty" class="empty-state" hidden>
      <div class="em">🔍</div>
      <p>Barang tidak ditemukan.</p>
    </div>
  </div>

  <nav id="app-bottomnav" class="bottomnav"></nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/index.js"></script>
</body>
</html>

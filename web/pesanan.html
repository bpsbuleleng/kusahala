<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Juara Belanja — Koperasi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-header"></header>

  <div class="container">
    <h1 class="page-title">🏆 Juara Belanja</h1>

    <div class="toolbar">
      <select id="bulan"></select>
      <select id="tahun"></select>
      <button class="btn btn-primary" id="btn-tampil">Tampilkan</button>
      <button class="btn btn-green" id="btn-xlsx">⬇️ Excel</button>
      <button class="btn btn-danger" id="btn-pdf">⬇️ PDF</button>
    </div>

    <div class="table-wrap">
      <table class="tbl" id="tabel">
        <thead><tr><th>No</th><th>Nama Pegawai</th><th>Jumlah Pesanan</th><th>Total Belanja (Rp)</th></tr></thead>
        <tbody></tbody>
        <tfoot><tr><td colspan="2">Total</td><td id="f-qty">0</td><td id="f-total">0</td></tr></tfoot>
      </table>
    </div>
  </div>

  <nav id="app-bottomnav" class="bottomnav"></nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pesanan.js"></script>
</body>
</html>

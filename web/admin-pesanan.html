<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Pesanan — Koperasi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-header"></header>

  <div class="container">
    <div class="toolbar">
      <a class="btn btn-outline" href="admin-barang.html">📦 Barang</a>
      <a class="btn btn-outline" href="admin-pegawai.html">👤 Pegawai</a>
      <a class="btn btn-primary" href="admin-pesanan.html">🧾 Pesanan</a>
      <a class="btn btn-outline" href="laporan.html">📊 Laporan</a>
      <span id="admin-bar" style="margin-left:auto;display:flex;align-items:center"></span>
    </div>

    <h1 class="page-title">Daftar & Edit Pesanan</h1>
    <p class="text-muted" style="font-size:13px;margin-top:-6px">
      Ubah tanggal/pegawai, tambah-hapus item, atau ubah kuantitas bila barang tidak tersedia saat belanja.
      Perubahan langsung tersimpan dan ikut terhitung saat <b>Generate Laporan</b>.
    </p>

    <div class="toolbar">
      <label style="display:flex;align-items:center;gap:6px">Dari <input type="date" id="dari"></label>
      <label style="display:flex;align-items:center;gap:6px">Sampai <input type="date" id="sampai"></label>
      <button class="btn btn-primary" id="btn-tampil">Tampilkan</button>
      <span id="info" class="text-muted" style="font-size:13px;align-self:center"></span>
    </div>

    <!-- Rekap -->
    <div class="section" id="rekap">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center">
        <div style="background:var(--brand);color:#fff;padding:12px;border-radius:8px">
          <small>Total Beli</small><div id="rk-beli" style="font-weight:700;font-size:16px">Rp0</div></div>
        <div style="background:var(--green);color:#fff;padding:12px;border-radius:8px">
          <small>Total Jual</small><div id="rk-jual" style="font-weight:700;font-size:16px">Rp0</div></div>
        <div style="background:#f4b400;color:#222;padding:12px;border-radius:8px">
          <small>Keuntungan</small><div id="rk-untung" style="font-weight:700;font-size:16px">Rp0</div></div>
      </div>
      <div class="text-muted" style="font-size:13px;text-align:center;margin-top:8px" id="rk-count">0 pesanan</div>
    </div>

    <!-- Tambah pesanan baru -->
    <div class="toolbar">
      <select id="np-pegawai" style="min-width:180px"></select>
      <input type="date" id="np-tgl" style="width:150px">
      <button class="btn btn-green" id="btn-add-order">+ Pesanan Baru</button>
    </div>

    <div id="orders"></div>
  </div>

  <nav id="app-bottomnav" class="bottomnav"></nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-pesanan.js"></script>
</body>
</html>
